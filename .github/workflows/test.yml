name: test

on: workflow_dispatch

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
      - run: npm i -g npm@11.14.0
      - name: 'npm ci (1回目)'
        run: npm ci
      - name: 'npm ci (2回目)'
        run: npm ci
      - name: 'npm ci (3回目)'
        run: npm ci
